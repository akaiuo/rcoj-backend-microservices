<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>您的登录验证码</title>
    <style type="text/css">
        /* 内联样式确保邮件客户端兼容性 */
        .container {
            max-width: 600px;
            margin: 0 auto;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #444;
        }
        .content {
            padding: 30px 20px;
            background: #ffffff;
        }
        .code-box {
            font-size: 32px;
            letter-spacing: 10px;
            padding: 20px;
            background: #f8f9fa;
            text-align: center;
            margin: 25px 0;
            border-radius: 8px;
            color: #2d3436;
        }
        .footer {
            padding: 5px;
            text-align: center;
            color: #6c757d;
            font-size: 12px;
            background: #f8f9fa;
        }
    </style>
</head>
<body>
<div class="container">

    <div class="content">

        <p>您正在尝试登录/注册，请输入以下验证码：</p>
        <p>You are trying to log in or register, so please enter the following verification code to continue：</p>

        <div class="code-box">
            {{code}}
        </div>

        <p style="color: #6c757d;">该验证码 <strong>3分钟</strong> 内有效，请勿泄露给他人</p>
        <p style="color: #6c757d;">This verification code is valid for <strong>3 minutes</strong>, do not share it with anyone</p>
    </div>

    <div class="footer">
        <p>© 2025 neo . 保留所有权利 All rights reserved</p>
    </div>
</div>
</body>
</html>
