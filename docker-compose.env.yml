version: '3'
services:
  mysql: # 服务名称
    image: mysql:8 # 或其它mysql版本
    container_name: whoj-mysql # 容器名称
    environment:
      - MYSQL_ROOT_PASSWORD=123456 # root用户密码
      - TZ=Asia/Shanghai # 设置容器时区 我这里通过下面挂载方式同步的宿主机时区和时间了,这里忽略
    volumes:
      - /home/docker/mysql8/log:/var/log/mysql # 映射日志目录，宿主机:容器
      - /home/docker/mysql8/data:/var/lib/mysql # 映射数据目录，宿主机:容器
      - /home/docker/mysql8/conf.d:/etc/mysql/conf.d # 映射配置目录，宿主机:容器
      - /etc/localtime:/etc/localtime:ro # 让容器的时钟与宿主机时钟同步，避免时间的问题，ro是read only的意思，就是只读。
    ports:
      - "3306:3306" # 指定宿主机端口与容器端口映射关系，宿主机:容器
    restart: always # 容器随docker启动自启
    networks:
      - mynetwork # 加入到自定义的网络中

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - mynetwork
    volumes:
      - ./.redis-data:/data # 持久化

  rabbitmq:
    image: rabbitmq:management # 支持管理面板的消息队列
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672" # RabbitMQ Dashboard 端口
    volumes:
      - ./.rabbitmq-data:/var/lib/rabbitmq # 持久化
    networks:
      - mynetwork

  nacos:
    image: nacos/nacos-server:v2.3.0-slim
    container_name: nacos
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    volumes:
      - ./.nacos-data:/home/nacos/data
    networks:
      - mynetwork
    environment:
      - MODE=standalone # 单节点模式启动
      - PREFER_HOST_MODE=hostname # 支持 hostname
      - TZ=Asia/Shanghai # 控制时区

  whoj-backend-gateway:
    container_name: whoj-backend-gateway
    build: # 服务的 Docker 构建文件位置
      context: ./whoj-backend-gateway
      dockerfile: Dockerfile
    ports:
      - "8101:8101"
    networks:
      - mynetwork
    depends_on:
      - nacos

  whoj-backend-user-service:
    container_name: whoj-backend-user-service
    build:
      context: ./whoj-backend-user-service
      dockerfile: Dockerfile
    ports:
      - "8102:8102"
    networks:
      - mynetwork
    depends_on: # 本服务依赖的服务，控制启动先后顺序
      - whoj-backend-gateway
      - redis

  whoj-backend-question-service:
    container_name: whoj-backend-question-service
    build:
      context: ./whoj-backend-question-service
      dockerfile: Dockerfile
    ports:
      - "8103:8103"
    networks:
      - mynetwork
    depends_on:
      - whoj-backend-user-service
      - whoj-backend-gateway

  whoj-backend-judge-service:
    container_name: whoj-backend-judge-service
    build:
      context: ./whoj-backend-judge-service
      dockerfile: Dockerfile
    ports:
      - "8104:8104"
    networks:
      - mynetwork
    depends_on:
      - whoj-backend-user-service
      - whoj-backend-question-service
      - whoj-backend-gateway

  whoj-backend-post-service:
    container_name: whoj-backend-post-service
    build:
      context: ./whoj-backend-post-service
      dockerfile: Dockerfile
    ports:
      - "8105:8105"
    networks:
      - mynetwork
    depends_on:
      - whoj-backend-user-service
      - whoj-backend-gateway

  whoj-backend-validation-service:
    container_name: whoj-backend-validation-service
    build:
      context: ./whoj-backend-validation-service
      dockerfile: Dockerfile
    ports:
      - "8106:8106"
    networks:
      - mynetwork
    depends_on:
      - whoj-backend-user-service
      - whoj-backend-gateway

  code-sandbox:
    container_name: sandbox
    build:
      context: ./sandbox
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    networks:
      - mynetwork

networks:
  mynetwork:
    external: true
